<style>
:root {
  --navy: #050816;
  --navy2: #080d1f;
  --blue: #00BFFF;
  --blue-dim: #0090cc;
  --blue-glow: rgba(0,191,255,0.25);
  --blue-faint: rgba(0,191,255,0.08);
  --white: #ffffff;
  --muted: rgba(255,255,255,0.55);
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(0,191,255,0.18);
  --glass: rgba(5,8,22,0.7);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#050816;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

h1,h2,h3,h4,h5,.nav-logo,.brand-name-electrotech,.brand-name-automation{font-family:'Syne',sans-serif;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#050816;}
::-webkit-scrollbar-thumb{background:#00BFFF;border-radius:2px;}

/* Navigation */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.25rem 5%;
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(5,8,22,0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  cursor: pointer;
  text-decoration: none;
  color: #fff;
}
.logo-svg-container {
  width: 42px;
  height: 42px;
}
.logo-svg {
  width: 100%;
  height: 100%;
  animation: spin 24s linear infinite;
}
.logo-svg-container:hover .logo-svg {
  animation-duration: 4s;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
.logo-text-container {
  display: flex;
  flex-direction: column;
  line-height: 1;
}
.brand-name-electrotech {
  font-family: 'Rockwell', 'Courier New', Courier, Georgia, serif;
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: 2px;
  color: #fff;
}
.brand-name-automation {
  font-family: 'Rockwell', 'Courier New', Courier, Georgia, serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 5.5px;
  color: var(--blue);
}
.nav-links {
  display: flex;
  list-style: none;
  gap: 1.8rem;
  align-items: center;
}
.nav-links a {
  text-decoration: none;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 500;
  transition: all 0.2s;
  position: relative;
  font-family: 'Syne', sans-serif;
}
.nav-links a:hover {
  color: #fff;
}
.nav-links a.active {
  color: #fff;
}
.nav-links a.active::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--blue);
  box-shadow: 0 0 8px var(--blue);
}
.nav-cta {
  background: transparent;
  border: 1px solid var(--card-border);
  color: #fff;
  padding: 0.65rem 1.3rem;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}
.nav-cta:hover {
  background: var(--blue);
  color: var(--navy);
  border-color: var(--blue);
  box-shadow: 0 0 15px rgba(0,191,255,0.35);
}
.mobile-menu-btn {
  display: none;
  background: transparent;
  border: none;
  color: #fff;
  cursor: pointer;
}

/* Page content */
.explore-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 76px);
}

/* Sidebar styling */
.catalog-sidebar {
  width: 320px;
  border-right: 1px solid rgba(0, 191, 255, 0.15);
  overflow-y: auto;
  padding: 1.5rem;
  background: rgba(0, 0, 0, 0.25);
  display: flex;
  flex-direction: column;
}
.catalog-search-wrapper {
  margin-bottom: 1.5rem;
}
.catalog-search-input {
  width: 100%;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 8px;
  color: #fff;
  padding: 0.75rem 1rem;
  font-family: inherit;
  font-size: 0.85rem;
  transition: all 0.25s;
}
.catalog-search-input:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 8px rgba(0, 191, 255, 0.25);
}
.catalog-cat-list {
  list-style: none;
  margin: 0;
  padding: 0;
  flex: 1;
}
.catalog-cat-item {
  padding: 0.75rem 1rem;
  margin-bottom: 0.4rem;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem;
  color: var(--muted);
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.catalog-cat-item:hover {
  background: rgba(255, 255, 255, 0.03);
  color: #fff;
}
.catalog-cat-item.active {
  background: rgba(0, 191, 255, 0.12);
  color: #fff;
  border: 1px solid rgba(0, 191, 255, 0.22);
  font-weight: 600;
}
.catalog-cat-badge {
  font-size: 0.72rem;
  background: rgba(0, 0, 0, 0.3);
  padding: 0.15rem 0.45rem;
  border-radius: 4px;
  color: var(--blue);
  border: 1px solid rgba(0, 191, 255, 0.15);
}

/* Main Area */
.catalog-main {
  flex: 1;
  overflow-y: auto;
  padding: 2.2rem;
  background: rgba(5, 8, 22, 0.35);
  display: flex;
  flex-direction: column;
}
.catalog-main-header {
  margin-bottom: 2rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  padding-bottom: 1.2rem;
}
.catalog-main-title {
  font-size: 1.6rem;
  font-family: 'Syne', sans-serif;
  margin-bottom: 0.6rem;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.catalog-main-desc {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.5;
}
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1.5rem;
}
.catalog-card {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 12px;
  padding: 1rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  height: 100%;
}
.catalog-card:hover {
  transform: translateY(-5px);
  border-color: rgba(0, 191, 255, 0.28);
  box-shadow: 0 5px 25px rgba(0, 191, 255, 0.1);
  background: rgba(255, 255, 255, 0.03);
}
.catalog-card-image-box {
  width: 100%;
  aspect-ratio: 1;
  background: rgba(0, 0, 0, 0.25);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  margin-bottom: 1rem;
  border: 1px solid rgba(255, 255, 255, 0.02);
}
.catalog-card-image-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.catalog-card:hover .catalog-card-image-box img {
  transform: scale(1.08);
}
.catalog-card-body {
  display: flex;
  flex-direction: column;
  flex: 1;
}
.catalog-card-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  margin-bottom: 0.4rem;
  color: #fff;
  font-weight: 600;
}
.catalog-card-desc {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.4;
  margin-bottom: 1rem;
  flex: 1;
}
.catalog-card-btn {
  width: 100%;
  background: rgba(0, 191, 255, 0.08);
  border: 1px solid rgba(0, 191, 255, 0.22);
  border-radius: 6px;
  color: var(--blue);
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.55rem 0;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.catalog-card-btn:hover {
  background: var(--blue);
  color: var(--navy);
  box-shadow: 0 0 10px rgba(0, 191, 255, 0.35);
}

/* Responsive adjustments */
@media (max-width: 900px) {
  nav {
    padding: 1rem 5%;
  }
  .nav-links {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 73px;
    right: -100%;
    width: 280px;
    height: calc(100vh - 73px);
    background: rgba(5,8,22,0.96);
    backdrop-filter: blur(15px);
    padding: 2rem;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    border-left: 1px solid rgba(255,255,255,0.05);
    transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    gap: 1.5rem;
    align-items: flex-start;
  }
  .nav-links.active {
    right: 0;
  }
  .mobile-menu-btn {
    display: block;
  }
  .nav-cta, #userProfileHeader {
    display: none;
  }
  .explore-container {
    flex-direction: column;
    height: auto;
  }
  .catalog-sidebar {
    width: 100%;
    height: 250px;
    border-right: none;
    border-bottom: 1px solid rgba(0, 191, 255, 0.15);
  }
}
</style>
</head>

let activeCatalogCategory = "001";

// Mobile nav menu logic
function toggleMobileMenu() {
  const links = document.getElementById("navLinks");
  const icon = document.getElementById("hamburgerIcon");
  if (links) {
    links.classList.toggle("active");
    if (links.classList.contains("active")) {
      icon.innerHTML = `<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>`;
    } else {
      icon.innerHTML = `<line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>`;
    }
  }
}

function renderCatalogCategories() {
  const catList = document.getElementById("catalogCatList");
  if (!catList) return;
  catList.innerHTML = "";
  
  const searchVal = document.getElementById("catalogSearch").value.toLowerCase();
  
  Object.keys(catalogData).forEach(cat => {
    const defaultName = `Industrial Spares (Cat #${cat})`;
    const name = categoryNames[cat] || defaultName;
    
    if (searchVal && !name.toLowerCase().includes(searchVal) && !cat.includes(searchVal)) {
      return;
    }
    
    const count = catalogData[cat].length;
    const li = document.createElement("li");
    li.className = "catalog-cat-item" + (cat === activeCatalogCategory ? " active" : "");
    li.innerHTML = `<span>${name}</span><span class="catalog-cat-badge">${count}</span>`;
    li.onclick = () => selectCatalogCategory(cat);
    catList.appendChild(li);
  });
}

function selectCatalogCategory(cat) {
  activeCatalogCategory = cat;
  
  // Highlight in sidebar
  const items = document.querySelectorAll(".catalog-cat-item");
  const catKeys = Object.keys(catalogData);
  
  const searchVal = document.getElementById("catalogSearch").value.toLowerCase();
  const filteredKeys = catKeys.filter(k => {
    const name = categoryNames[k] || `Industrial Spares (Cat #${k})`;
    return !searchVal || name.toLowerCase().includes(searchVal) || k.includes(searchVal);
  });
  
  const idx = filteredKeys.indexOf(cat);
  items.forEach(el => el.classList.remove("active"));
  if (idx !== -1 && items[idx]) {
    items[idx].classList.add("active");
  }
  
  // Update header and description
  const defaultName = `Industrial Components & Spares #${cat}`;
  const name = categoryNames[cat] || defaultName;
  const desc = categoryDescriptions[cat] || "A selection of components, spare parts, and accessories matching this product group.";
  
  document.getElementById("catalogMainTitle").textContent = name;
  document.getElementById("catalogMainDesc").textContent = desc;
  
  // Render grid
  const grid = document.getElementById("catalogGrid");
  if (!grid) return;
  grid.innerHTML = "";
  
  const ids = catalogData[cat];
  ids.forEach(id => {
    const paddedId = String(id).padStart(4, "0");
    const filename = `product_${cat}_${paddedId}.jpg`;
    const filepath = `catalogue_images/${filename}`;
    
    const card = document.createElement("div");
    card.className = "catalog-card";
    card.innerHTML = `
      <div class="catalog-card-image-box">
        <img src="${filepath}" alt="Part #${paddedId}" onerror="this.src='assets/products/industrial_plc.jpg';">
      </div>
      <div class="catalog-card-body">
        <div class="catalog-card-title">Part #${paddedId}</div>
        <div class="catalog-card-desc">Industrial grade component matching automation catalog spec group ${cat}.</div>
        <button class="catalog-card-btn" onclick="inquireAboutPart('${paddedId}', '${cat}')">Request Quote</button>
      </div>
    `;
    grid.appendChild(card);
  });
  
  // Push state to URL without reloading to allow back navigation/sharing
  history.replaceState(null, "", `?cat=${cat}`);
}

function filterCatalogCategories() {
  renderCatalogCategories();
}

function inquireAboutPart(partId, cat) {
  // Redirect back to landing page contact form with parameters
  window.location.href = `index.html?part=${partId}&cat=${cat}#contact`;
}

// Load query params on startup
document.addEventListener("DOMContentLoaded", () => {
  // Parse session
  const savedUser = localStorage.getItem("currentUser");
  if (savedUser) {
    try {
      const user = JSON.parse(savedUser);
      document.getElementById("headerUsername").textContent = user.username;
      document.getElementById("headerRole").textContent = user.role;
      document.getElementById("userProfileHeader").style.display = "flex";
    } catch (e) {}
  }
  
  const params = new URLSearchParams(window.location.search);
  const catParam = params.get("cat") || "001";
  
  if (catalogData[catParam]) {
    activeCatalogCategory = catParam;
  }
  
  renderCatalogCategories();
  selectCatalogCategory(activeCatalogCategory);
});
